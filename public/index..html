<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sky Dana • Southwest Bases</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body data-page="home">
  <header class="sd-header">
    <div class="sd-logo">✈ Sky Dana</div>
    <nav class="sd-nav">
      <button class="sd-nav-pill" data-filter="all">All Bases</button>
      <button class="sd-nav-pill" data-filter="primary">Primary</button>
      <button class="sd-nav-pill" data-filter="satellite">Satellite</button>
    </nav>
  </header>

  <main class="sd-main">
    <section class="sd-hero">
      <h1>Southwest Flight Attendant Bases</h1>
      <p>Every base. Every layover. Cheap eats, crash pads, transport, and adventures—crew‑ready in one place.</p>

      <div class="sd-search-bar">
        <input type="text" id="baseSearch" placeholder="Search base (ATL, DAL, LAS, PHX, BWI...)" />
        <button id="searchBtn">Search</button>
      </div>

      <div class="sd-hero-tags">
        <span class="sd-tag">Cheap Eats</span>
        <span class="sd-tag">Crash Pads</span>
        <span class="sd-tag">Transport Hacks</span>
        <span class="sd-tag">Crew Adventures</span>
      </div>
    </section>

    <section class="sd-base-grid" id="baseGrid">
      <!-- Cards injected by JS -->
    </section>
  </main>

  <footer class="sd-footer">
    <span>Sky Dana • Layover Intelligence for Flight Attendants</span>
  </footer>

  <script src="../js/app.js"></script>
</body>
</html>
